name: 맥점 알림봇 (BTC 15분)
on:
  # 15분 cron 비활성화 (2026-06-22): Oracle Cloud 상시봇(ws_watch.py)이 실시간 알림 담당.
  # 확정신호 중복 방지를 위해 스케줄 제거. 필요 시 아래 주석 해제하면 cron 부활.
  # schedule:
  #   - cron: "*/15 * * * *"
  workflow_dispatch:   # 수동 실행은 유지(백업용)
concurrency:
  group: alert-bot
  cancel-in-progress: false
jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: "utf-8"
        run: python alert_bot.py --cron
