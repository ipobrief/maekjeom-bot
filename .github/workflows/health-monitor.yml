name: 봇 다운 감시 (외부 헬스체크)

on:
  schedule:
    - cron: "*/15 * * * *"   # 15분마다 (UTC, GitHub 사정상 다소 지연될 수 있음)
  workflow_dispatch:          # 수동 실행 = 정상 작동 테스트

concurrency:
  group: health-monitor
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: 서버·봇 상태 점검 후 이상 시 텔레그램 알림
        env:
          MONITOR_SSH_KEY: ${{ secrets.MONITOR_SSH_KEY }}
          MONITOR_HOST: ${{ secrets.MONITOR_HOST }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$MONITOR_SSH_KEY" > ~/.ssh/id_monitor
          chmod 600 ~/.ssh/id_monitor

          send() {
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" -d text="$1" >/dev/null
          }

          set +e
          OUT=$(ssh -i ~/.ssh/id_monitor -o StrictHostKeyChecking=no \
                    -o ConnectTimeout=20 -o BatchMode=yes \
                    ubuntu@"${MONITOR_HOST}" 2>/dev/null)
          RC=$?
          set -e
          echo "rc=$RC out=$OUT"

          if [ $RC -ne 0 ]; then
            send "🔴 [맥점봇 감시] 서버 응답 없음 — Oracle VM 다운/네트워크 장애 의심 (${MONITOR_HOST}). 점검 필요."
          elif [ "${OUT#OK}" != "$OUT" ]; then
            # OUT 이 OK 로 시작 → 정상
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              send "✅ [맥점봇 감시] 정상 작동 중 — 1h·15m 봇 모두 active (수동 점검)."
            fi
          else
            send "🔴 [맥점봇 감시] 봇 꺼짐 — ${OUT} (서버는 살아있음, systemd 재시작 실패 의심)."
          fi
